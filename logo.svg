<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="André's Investment Guidance">
  <title>André's Investment Guidance</title>
  <!-- Andaluma-family mark: dark rounded badge with four ascending bars (brand palette) + rising trend line -->
  <rect x="0" y="0" width="96" height="96" rx="16" fill="#1A1208"/>
  <!-- Ascending bars: berry, teal, amber, coral -->
  <rect x="17" y="56" width="12" height="23" rx="2.5" fill="#B83368"/>
  <rect x="34" y="46" width="12" height="33" rx="2.5" fill="#0A7A88"/>
  <rect x="51" y="34" width="12" height="45" rx="2.5" fill="#C98A10"/>
  <rect x="68" y="22" width="12" height="57" rx="2.5" fill="#E04F28"/>
  <!-- Rising trend line across the bar tops -->
  <path d="M17 61 L40 51 L57 39 L82 26" fill="none" stroke="#F7F2E8" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>
  <!-- Trend endpoint node -->
  <circle cx="82" cy="26" r="4.6" fill="#F7F2E8"/>
  <circle cx="82" cy="26" r="2.1" fill="#E04F28"/>
</svg>
